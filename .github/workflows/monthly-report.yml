# Build traction reports from RupeeVest and publish HTML to GitHub Pages.
#
# Setup (once) — use the gh-pages branch (reliable):
#   Repo Settings → Pages → Build and deployment
#     Source: Deploy from a branch
#     Branch: gh-pages / (root)
#
# Manual run: Actions → "Monthly traction report" → Run workflow
#   Toggle "Deploy HTML to GitHub Pages" (on by default). Scheduled runs always deploy.
# Optional secret: GEMINI_API_KEY (omit for rules-only insights)

name: Monthly traction report

on:
  schedule:
    # 03:00 UTC on the 5th — after typical month-end disclosure lag
    - cron: "0 3 5 * *"
  workflow_dispatch:
    inputs:
      month:
        description: "Month folder slug (e.g. june). Leave empty for previous UTC month (disclosure lag)."
        required: false
        default: ""
      overwrite_funds:
        description: "Re-download fund CSVs even if they already exist in the runner workspace"
        type: boolean
        default: true
      refresh_prices:
        description: "Ignore yfinance price cache and refresh"
        type: boolean
        default: true
      deploy_pages:
        description: "Deploy HTML to GitHub Pages (gh-pages branch)"
        type: boolean
        default: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-traction
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: pip install -e .

      - name: Resolve month slug
        id: month
        env:
          INPUT_MONTH: ${{ inputs.month }}
        run: |
          if [ -n "${INPUT_MONTH}" ]; then
            SLUG=$(echo "${INPUT_MONTH}" | tr '[:upper:]' '[:lower:]' | tr ' ' '_')
          else
            # MF disclosures lag: default to previous calendar month (UTC)
            SLUG=$(python3 -c "
          import datetime
          today = datetime.datetime.now(datetime.timezone.utc).date()
          first = today.replace(day=1)
          prev = first - datetime.timedelta(days=1)
          print(prev.strftime('%B').lower())
          ")
          fi
          echo "slug=${SLUG}" >> "$GITHUB_OUTPUT"
          echo "Using month slug: ${SLUG}"

      - name: Ingest fund CSVs from RupeeVest
        env:
          OVERWRITE: ${{ inputs.overwrite_funds }}
        run: |
          ARGS=(
            --funds-file config/rupeevest_funds.example.txt
            --out-dir "funds/${{ steps.month.outputs.slug }}"
            --delay 1.0
          )
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${OVERWRITE}" = "true" ]; then
            ARGS+=(--overwrite)
          fi
          python3 scripts/download_rupeevest_funds.py "${ARGS[@]}"

      - name: Run month pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REFRESH: ${{ inputs.refresh_prices }}
        run: |
          ARGS=(
            --folder "funds/${{ steps.month.outputs.slug }}"
            --out-dir output
          )
          if [ -z "${GEMINI_API_KEY}" ]; then
            ARGS+=(--no-gemini)
          fi
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${REFRESH}" = "true" ]; then
            ARGS+=(--refresh-prices)
          fi
          python3 -m mf_screener.month_run "${ARGS[@]}"

      - name: Prepare Pages site
        run: |
          mkdir -p _site
          if [ -f output/html/traction.html ]; then
            cp -R output/html/. _site/
            cp output/html/traction.html _site/index.html
          else
            shopt -s nullglob
            months=(output/html/*_traction.html)
            if [ ${#months[@]} -eq 0 ]; then
              echo "No HTML reports under output/html/" >&2
              ls -la output/html/ || true
              exit 1
            fi
            cp "${months[@]}" _site/
            cp "${months[-1]}" _site/index.html
            echo "WARN: output/html/traction.html missing; using ${months[-1]} as index.html" >&2
          fi
          touch _site/.nojekyll
          test -s _site/index.html
          echo "Pages root contents:"
          ls -la _site
          echo "index.html bytes: $(wc -c < _site/index.html)"

      - name: Upload report bundle (optional download)
        uses: actions/upload-artifact@v4
        with:
          name: traction-reports-${{ steps.month.outputs.slug }}
          path: |
            output/html
            output/json
            output/csv
            _site
          if-no-files-found: warn
          retention-days: 30

      - name: Deploy to gh-pages branch
        if: github.event_name == 'schedule' || inputs.deploy_pages == true
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
