<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MF traction report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,600&display=swap" rel="stylesheet" />
  <style>
__STYLES__
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="toolbar-inner">
      <p class="eyebrow" id="eyebrow">Mutual fund holdings</p>
      <h1>Cross-fund stock traction</h1>
      <p class="sub" id="subtitle"></p>
      <div class="month-tabs" id="month-tabs"></div>
      <div class="stats" id="stats"></div>
      <div class="filters" id="filters"></div>
      <div class="sorts" id="sorts"></div>
      <p class="price-banner" id="price-banner" hidden></p>
      <input type="search" id="search" placeholder="Search stock or NSE symbol…" autocomplete="off" />
      <p class="countline" id="countline" aria-live="polite"></p>
    </div>
  </div>
  <div class="wrap">
    <section class="insights-panel" id="insights-panel" hidden>
      <button type="button" class="insights-toggle" id="insights-toggle" aria-expanded="true" aria-controls="insights-body">
        <h2 class="insights-title">Insights</h2>
        <span class="insights-chevron" id="insights-chevron" aria-hidden="true">▼</span>
      </button>
      <div class="insights-body" id="insights-body">
        <p class="insights-disclaimer">Monthly triage from this report’s holdings data — not investment advice.</p>
        <div class="insights-section" id="top-traction-section" hidden>
          <h3 class="insights-section-title">Top traction</h3>
          <ol class="top-traction-list" id="top-traction-list"></ol>
        </div>
        <div id="insights-sections"></div>
      </div>
    </section>
    <ul class="stock-list" id="list"></ul>
    <footer>Generated by mf-screener · Share % is month-over-month change in shares held</footer>
  </div>
  <script>
__SCRIPT__
  </script>
</body>
</html>
